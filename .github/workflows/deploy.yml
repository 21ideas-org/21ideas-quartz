name: Deploy 21wiki to GitHub Pages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [wiki-updated]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout Quartz repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout wiki content
        uses: actions/checkout@v6
        with:
          repository: 21ideas-org/21ideas-wiki
          path: wiki-content
          fetch-depth: 0

      - name: Copy wiki content to build tree
        run: |
          mkdir -p content/en content/ru
          cp -r wiki-content/wiki-en/. content/en/
          cp -r wiki-content/wiki-ru/. content/ru/

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build -d content/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5